    .btn-scan { background: transparent; border-color: #334155; color: #94a3b8; transition: border-color .2s, color .2s; }

// ── Utilitaires ───────────────────────────────────────────────────────────

const fmt    = function(n, d) { d = d == null ? 2 : d; return n != null ? Number(n).toFixed(d) : '—'; };
const fmtPct = function(n) { return n != null ? (n > 0 ? '+' : '') + fmt(n) + '%' : '—'; };
const chgClr = function(n) { return n > 0 ? '#10b981' : n < 0 ? '#ef4444' : '#64748b'; };
const sntClr = function(s) { return s === 'BULL' ? '#10b981' : s === 'BEAR' ? '#ef4444' : '#f59e0b'; };
const scrClr = function(s) { return s >= 70 ? '#10b981' : s >= 50 ? '#3b82f6' : s >= 30 ? '#f59e0b' : '#ef4444'; };

const CHART_COLORS = ['#3b82f6', '#10b981', '#8b5cf6', '#f59e0b', '#ef4444'];
const RANK_COLORS  = { 1: '#3b82f6', 2: '#8b5cf6', 3: '#10b981' };
const STYLE_COLORS = { SWING: '#3b82f6', PUMP: '#ef4444', MIXED: '#f59e0b', DAY: '#8b5cf6' };

// ── Composants de base ────────────────────────────────────────────────────

function ScoreBar(props) {
  var val = props.val || 0;
  var max = props.max || 25;
  var color = props.color || '#3b82f6';
  return React.createElement('div', { className: 'strack' },
    React.createElement('div', { className: 'sfill', style: { width: (val / max * 100) + '%', background: color } })
  );
}

// ── Instrument Card ───────────────────────────────────────────────────────

function InstrumentCard(props) {
  var name = props.name;
  var data = props.data || {};
  var price = data.price;
  var chg   = data.change;
  var color = chgClr(chg);
  var arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
  return (
    <div className="card card-sm">
      <div className="inst-name">{name}</div>
      <div className="inst-price" style={{ color: price != null ? 'var(--text)' : 'var(--muted)' }}>
        {price != null ? fmt(price) : '—'}
      </div>
      <div className="inst-chg" style={{ color: color }}>
        {price != null ? arrow + ' ' + fmtPct(chg) : 'N/A'}
      </div>
    </div>
  );
}

// ── Barre régime + verdict ────────────────────────────────────────────────

function RegimeBar(props) {
  var market = props.market || {};
  var macro  = props.macro  || {};
  var regime  = market.regime;
  var score   = market.score;
  var sizing  = market.sizing_recommendation;
  var verdict = macro.verdict;
  var events  = macro.events || [];
  var earnings = macro.earnings_today || [];

  var verdictCls = verdict === 'GO' ? 'b-bull' : verdict === 'NO TRADE' ? 'b-bear' : 'b-neutral';

  return (
    <div className="card mb16 row wrap g12" style={{ padding: '10px 16px' }}>
      {regime && (
        <div className="row g8">
          <span className="mc" style={{ fontSize: 10, letterSpacing: 1 }}>RÉGIME</span>
          <span className={'rpill rp-' + regime}>{regime}</span>
          {score != null && <span style={{ fontWeight: 700, color: sntClr(regime) }}>{score}/100</span>}
        </div>
      )}
      {sizing && (
        <div className="row g8">
          <div className="vd" />
          <span className="mc" style={{ fontSize: 10, letterSpacing: 1 }}>SIZING</span>
          <span style={{ fontWeight: 700 }}>{sizing}</span>
        </div>
      )}
      {verdict && (
        <div className="row g8">
          <div className="vd" />
          <span className="mc" style={{ fontSize: 10, letterSpacing: 1 }}>VERDICT</span>
          <span className={'badge ' + verdictCls}>{verdict}</span>
          {macro.risque && <span className="mc" style={{ fontSize: 10 }}>{macro.risque}</span>}
        </div>
      )}
      {events.length > 0 && (
        <div className="row g6 wrap">
          <div className="vd" />
          <span className="mc" style={{ fontSize: 10, letterSpacing: 1 }}>EVENTS</span>
          {events.map(function(e, i) {
            return <span key={i} className={'badge ' + (e.impact === 'FORT' ? 'b-bear' : 'b-neutral')}>{e.name}</span>;
          })}
        </div>
      )}
      {earnings.length > 0 && (
        <div className="row g6 wrap">
          <div className="vd" />
          <span className="mc" style={{ fontSize: 10, letterSpacing: 1 }}>EARNINGS</span>
          {earnings.map(function(t) { return <span key={t} className="badge b-bear">{t}</span>; })}
        </div>
      )}
    </div>
  );
}

// ── Top 3 ─────────────────────────────────────────────────────────────────

function Top3Section(props) {
  var tickers = props.tickers || [];
  var top3 = tickers.filter(function(t) { return t.top3; });
  if (!top3.length) return <div className="error-box mc">Pas encore de scores calculés</div>;

  return (
    <div className="g3 mb16">
      {top3.map(function(t) {
        var color = RANK_COLORS[t.rank] || '#64748b';
        var m = t.market || {};
        return (
          <div key={t.ticker} className={'t3card r' + t.rank}>
            <div className="t3bg">#{t.rank}</div>
            <div className="rowb mb12">
              <div>
                <a href={'https://www.tradingview.com/chart/?symbol=' + t.ticker} target="_blank" rel="noopener"
                   className="tv-link t3ticker" style={{ color: color }}>
                  {t.ticker} 📈
                </a>
                <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>
                  {m.price != null ? '$' + fmt(m.price) : ''}
                  {m.change_day != null && (
                    <span style={{ color: chgClr(m.change_day), marginLeft: 6 }}>{fmtPct(m.change_day)}</span>
                  )}
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div className="t3score" style={{ color: color }}>{Math.round(t.total_score || 0)}</div>
                <div className="t3lbl">/ 100</div>
              </div>
            </div>
            <div style={{ display: 'grid', gap: 5, marginBottom: 10 }}>
              {[['SMA200', t.sma200_score], ['Volume', t.volume_score], ['Reddit', t.reddit_score], ['News', t.news_score]].map(function(pair) {
                return (
                  <div key={pair[0]} className="row g8">
                    <span style={{ fontSize: 9, color: 'var(--muted)', width: 46 }}>{pair[0]}</span>
                    <ScoreBar val={pair[1] || 0} color={color} />
                    <span style={{ fontSize: 10, color: color, width: 18, textAlign: 'right' }}>{pair[1] || 0}</span>
                  </div>
                );
              })}
            </div>
            <div className="row g6 wrap">
              {m.dist_sma200 != null && (
                <span className={'badge ' + (m.dist_sma200 < 0 ? 'b-bull' : 'b-accent')}>
                  SMA200 {fmtPct(m.dist_sma200)}
                </span>
              )}
              {m.vol_relative != null && m.vol_relative >= 1.5 && (
                <span className="badge b-purple">VOL ×{fmt(m.vol_relative, 1)}</span>
              )}
              {t.reddit && t.reddit.mentions > 4 && (
                <span className="badge b-accent">Reddit ×{t.reddit.mentions}</span>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Overview Tab ──────────────────────────────────────────────────────────

function OverviewTab(props) {
  var data = props.data;
  var inst = (data.market && data.market.instruments) ? data.market.instruments : {};
  var redditItems = (data.reddit && data.reddit.data) ? data.reddit.data.filter(function(r) { return r.in_watchlist; }).slice(0, 5) : [];
  var newsItems = data.news ? [].concat(data.news.ticker_news || [], data.news.market_news || []).slice(0, 5) : [];

  return (
    <div>
      <div className="stitle">INDICATEURS MARCHÉ</div>
      <div className="g5 mb16">
        <InstrumentCard name="S&amp;P 500"    data={inst.spy}   />
        <InstrumentCard name="NASDAQ 100"     data={inst.qqq}   />
        <InstrumentCard name="VIX"            data={inst.vix}   />
        <InstrumentCard name="DOLLAR (DXY)"   data={inst.dxy}   />
        <InstrumentCard name="US 10Y YIELD"   data={inst.us10y} />
      </div>

      <RegimeBar market={data.market} macro={data.macro} />

      <div className="stitle">TOP 3 DU JOUR</div>
      <Top3Section tickers={data.tickers ? data.tickers.tickers : []} />

      <div className="g2">
        <div>
          <div className="stitle">REDDIT BUZZ (watchlist)</div>
          <div className="card">
            {redditItems.map(function(r) {
              return (
                <div key={r.ticker} className="rowb" style={{ padding: '7px 0', borderBottom: '1px solid rgba(30,41,59,.35)' }}>
                  <div className="row g8">
                    <span style={{ fontWeight: 700, width: 48 }}>{r.ticker}</span>
                    <span className="mc" style={{ fontSize: 11 }}>{r.mentions} mentions</span>
                  </div>
                  <span className={'badge ' + (r.sentiment_label === 'BULL' ? 'b-bull' : r.sentiment_label === 'BEAR' ? 'b-bear' : 'b-neutral')}>{r.sentiment_label}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div>
          <div className="stitle">NEWS RÉCENTES</div>
          <div className="card">
            {newsItems.map(function(n, i) {
              return (
                <div key={i} style={{ padding: '7px 0', borderBottom: '1px solid rgba(30,41,59,.35)' }}>
                  <div className="row g6 mb8" style={{ alignItems: 'flex-start' }}>
                    <span style={{ width: 8, height: 8, borderRadius: '50%', background: sntClr(n.sentiment), flexShrink: 0, marginTop: 3 }} />
                    <span style={{ fontSize: 11, lineHeight: 1.5 }}>{n.title}</span>
                  </div>
                  <div className="row g6" style={{ paddingLeft: 14 }}>
                    <span className="mc" style={{ fontSize: 10 }}>{n.source}</span>
                    {(n.matched_tickers || []).slice(0, 2).map(function(t) {
                      return <span key={t} className="badge b-accent" style={{ fontSize: 9, padding: '1px 5px' }}>{t}</span>;
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Watchlist Tab ─────────────────────────────────────────────────────────

function WatchlistTab(props) {
  var tickers = (props.data.tickers && props.data.tickers.tickers) ? props.data.tickers.tickers : [];
  var expanded = useState(null);
  var openRow = expanded[0];
  var setOpen = expanded[1];

  function toggle(tk) { setOpen(openRow === tk ? null : tk); }

  return (
    <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
      <table className="tbl">
        <thead>
          <tr>
            <th style={{ width: 36 }}>#</th>
            <th>Ticker</th>
            <th>Prix</th>
            <th>Jour %</th>
            <th>Sem. %</th>
            <th>SMA200</th>
            <th>Volume</th>
            <th style={{ textAlign: 'right', paddingRight: 16 }}>Score</th>
          </tr>
        </thead>
        <tbody>
          {tickers.map(function(t) {
            var m = t.market || {};
            var col = t.top3 ? (RANK_COLORS[t.rank] || null) : null;
            var isOpen = openRow === t.ticker;
            return [
              <tr key={t.ticker} onClick={function() { toggle(t.ticker); }} style={{ cursor: 'pointer', background: isOpen ? 'rgba(30,41,59,.25)' : undefined }}>
                <td style={{ borderLeft: col ? '3px solid ' + col : '3px solid transparent' }}>
                  <span className="mc">{t.rank}</span>
                </td>
                <td>
                  <div className="row g6">
                    <a href={'https://www.tradingview.com/chart/?symbol=' + t.ticker} target="_blank" rel="noopener"
                       className="tv-link" style={{ color: col || '#3b82f6' }}
                       onClick={function(e) { e.stopPropagation(); }}>
                      {t.ticker}
                    </a>
                    {t.top3 && <span style={{ fontSize: 9, color: col }}>★</span>}
                    <a href={'https://www.tradingview.com/chart/?symbol=' + t.ticker} target="_blank" rel="noopener"
                       style={{ fontSize: 11, textDecoration: 'none', lineHeight: 1 }}
                       onClick={function(e) { e.stopPropagation(); }}>📈</a>
                  </div>
                </td>
                <td>{m.price != null ? '$' + fmt(m.price) : '—'}</td>
                <td><span style={{ color: chgClr(m.change_day) }}>{fmtPct(m.change_day)}</span></td>
                <td><span style={{ color: chgClr(m.change_week) }}>{fmtPct(m.change_week)}</span></td>
                <td>
                  {m.dist_sma200 != null
                    ? <span style={{ color: m.above_sma200 ? 'var(--bull)' : 'var(--neutral)' }}>{m.above_sma200 ? '✓' : '▽'} {fmtPct(m.dist_sma200)}</span>
                    : <span className="mc">—</span>
                  }
                </td>
                <td>
                  <div className="row g6">
                    {m.vol_relative != null
                      ? <span style={{ color: m.vol_relative >= 1.5 ? 'var(--purple)' : m.vol_relative >= 1.2 ? 'var(--accent)' : 'var(--muted)' }}>×{fmt(m.vol_relative, 1)}</span>
                      : <span className="mc">—</span>
                    }
                    {m.vol_relative != null && m.vol_relative > 2.0 && (
                      <span className="badge b-bear badge-hot" style={{ fontSize: 9, padding: '1px 5px' }}>🔥 HOT</span>
                    )}
                  </div>
                </td>
                <td style={{ textAlign: 'right', paddingRight: 16 }}>
                  <div className="score-cell">
                    <div className="score-bar-bg" style={{ width: (t.total_score || 0) + '%', background: scrClr(t.total_score || 0) + '30' }} />
                    <span style={{ position: 'relative', fontWeight: 700, color: scrClr(t.total_score || 0), fontSize: 12 }}>{Math.round(t.total_score || 0)}</span>
                  </div>
                </td>
              </tr>,
              isOpen && (
                <tr key={t.ticker + '-x'} className="xrow">
                  <td colSpan={8}>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: 1, marginBottom: 10 }}>SOUS-SCORES / 25</div>
                        {[['SMA200', t.sma200_score, '#10b981'], ['Volume', t.volume_score, '#3b82f6'], ['Reddit', t.reddit_score, '#8b5cf6'], ['News', t.news_score, '#f59e0b']].map(function(p) {
                          return (
                            <div key={p[0]} className="row g8" style={{ marginBottom: 7 }}>
                              <span style={{ fontSize: 10, color: 'var(--muted)', width: 68 }}>{p[0]}</span>
                              <ScoreBar val={p[1] || 0} color={p[2]} />
                              <span style={{ fontSize: 11, fontWeight: 700, color: p[2], width: 26, textAlign: 'right' }}>{p[1] || 0}</span>
                            </div>
                          );
                        })}
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: 1, marginBottom: 10 }}>DÉTAILS</div>
                        {m.sma200 && <div style={{ fontSize: 11, marginBottom: 5 }}><span className="mc">SMA200 : </span>${fmt(m.sma200)} ({fmtPct(m.dist_sma200)}) {m.above_sma200 ? '✓' : '▽'}</div>}
                        {t.reddit && t.reddit.mentions > 0 && <div style={{ fontSize: 11, marginBottom: 5 }}><span className="mc">Reddit : </span>{t.reddit.mentions} mentions</div>}
                        {t.news_count && <div style={{ fontSize: 11 }}><span className="mc">News : </span>{t.news_count.ticker_matches} ticker + {t.news_count.keyword_matches} keyword</div>}
                      </div>
                    </div>
                  </td>
                </tr>
              )
            ];
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── Reddit Tab ────────────────────────────────────────────────────────────

function RedditTab(props) {
  var items = (props.data.reddit && props.data.reddit.data) ? props.data.reddit.data : [];
  var totalMent = items.reduce(function(s, r) { return s + r.mentions; }, 0);
  var netSent   = items.reduce(function(s, r) { return s + r.net_sentiment; }, 0);
  var active    = items.filter(function(r) { return r.mentions > 0; }).length;

  var chartData = items.slice(0, 12).map(function(r) {
    return { ticker: r.ticker, mentions: r.mentions, fill: sntClr(r.sentiment_label) };
  });

  return (
    <div>
      <div className="g3 mb16">
        <div className="metric"><div className="mval ac">{totalMent}</div><div className="mlbl">Total Mentions</div></div>
        <div className="metric"><div className="mval" style={{ color: netSent > 0 ? 'var(--bull)' : 'var(--bear)' }}>{netSent > 0 ? '+' : ''}{netSent}</div><div className="mlbl">Sentiment Net</div></div>
        <div className="metric"><div className="mval pc">{active}</div><div className="mlbl">Tickers Actifs</div></div>
      </div>

      <div className="card mb16">
        <div className="stitle" style={{ marginBottom: 14 }}>MENTIONS PAR TICKER</div>
        <ResponsiveContainer width="100%" height={190}>
          <BarChart data={chartData} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
            <XAxis dataKey="ticker" tick={{ fill: '#64748b', fontSize: 10, fontFamily: 'JetBrains Mono' }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill: '#64748b', fontSize: 10, fontFamily: 'JetBrains Mono' }} axisLine={false} tickLine={false} />
            <Tooltip contentStyle={{ background: '#111827', border: '1px solid #1e293b', borderRadius: 6, fontFamily: 'JetBrains Mono', fontSize: 11 }} />
            <Bar dataKey="mentions" radius={[3, 3, 0, 0]}>
              {chartData.map(function(d, i) { return <Cell key={i} fill={d.fill} />; })}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>

      <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
        <table className="tbl">
          <thead>
            <tr><th>Ticker</th><th>Mentions</th><th>Sentiment</th><th>Style</th><th>Subreddits</th></tr>
          </thead>
          <tbody>
            {items.map(function(r) {

              return (
                <tr key={r.ticker}>
                  <td>
                    <div className="row g6">
                      <span style={{ fontWeight: 700, color: r.in_watchlist ? 'var(--text)' : 'var(--muted)' }}>
                        {r.ticker}{r.in_watchlist && <span style={{ marginLeft: 5, fontSize: 9, color: 'var(--accent)' }}>●</span>}
                      </span>
                      <a href={'https://www.reddit.com/r/stocks/search/?q=' + r.ticker} target="_blank" rel="noopener"
                         style={{ fontSize: 10, textDecoration: 'none', color: 'var(--muted)' }}
                         title="Chercher sur Reddit">🔍</a>
                    </div>
                  </td>
                  <td><span style={{ fontWeight: 600 }}>{r.mentions}</span></td>
                  <td>
                    <span style={{ color: sntClr(r.sentiment_label), fontWeight: 600 }}>{r.net_sentiment > 0 ? '+' : ''}{r.net_sentiment}</span>
                    <span className="mc" style={{ marginLeft: 6, fontSize: 10 }}>{r.sentiment_label}</span>
                  </td>
                  <td>
                    {r.trade_style && r.trade_style !== '?'

                      : <span className="mc">—</span>

                  </td>
                  <td><span className="mc" style={{ fontSize: 11 }}>{(r.subreddits || []).slice(0, 3).join(', ') || '—'}</span></td>

        </table>
      </div>
    </div>
  );

// ── History Tab ───────────────────────────────────────────────────────────

function HistoryTab(props) {
  var hist = props.data.history || {};
  var htickers = hist.tickers || {};
  var tkNames = Object.keys(htickers);

  var chartData = useMemo(function() {
    var dateMap = {};
    tkNames.forEach(function(tk) {
      var scores = htickers[tk].scores || [];
      scores.forEach(function(e) {
        if (!dateMap[e.date]) dateMap[e.date] = { date: e.date };
        dateMap[e.date][tk] = e.total_score;
      });
    });
    return Object.values(dateMap).sort(function(a, b) { return a.date < b.date ? -1 : 1; });
  }, []);

  var fmtD = function(d) { return d ? d.slice(5).replace('-', '/') : ''; };

  if (!tkNames.length) {
    return <div className="card"><div className="mc" style={{ padding: 20, textAlign: 'center' }}>Aucun historique disponible</div></div>;
  }

  return (
    <div>
      <div className="row g8 wrap mb16">
        {tkNames.map(function(tk) {
          var t = htickers[tk];
          var trendCls = t.trend === 'HAUSSE' ? 'b-bull' : t.trend === 'BAISSE' ? 'b-bear' : 'b-muted';
          var arrow = t.trend === 'HAUSSE' ? '↑' : t.trend === 'BAISSE' ? '↓' : '→';
          return (
            <div key={tk} className="card card-sm row g8" style={{ padding: '7px 12px' }}>
              <span style={{ fontWeight: 700 }}>{tk}</span>
              <span className={'badge ' + trendCls}>{arrow} {t.delta > 0 ? '+' : ''}{t.delta}</span>
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="stitle" style={{ marginBottom: 14 }}>ÉVOLUTION DES SCORES — {hist.days || 14} DERNIERS JOURS</div>
        <ResponsiveContainer width="100%" height={320}>
          <AreaChart data={chartData} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
            <defs>
              {tkNames.map(function(tk, i) {
                var c = CHART_COLORS[i % CHART_COLORS.length];
                return (
                  <linearGradient key={tk} id={'grad' + i} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%"  stopColor={c} stopOpacity={0.25} />
                    <stop offset="95%" stopColor={c} stopOpacity={0}    />
                  </linearGradient>
                );
              })}
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
            <XAxis dataKey="date" tickFormatter={fmtD} tick={{ fill: '#64748b', fontSize: 10, fontFamily: 'JetBrains Mono' }} axisLine={false} tickLine={false} />
            <YAxis domain={[0, 100]} tick={{ fill: '#64748b', fontSize: 10, fontFamily: 'JetBrains Mono' }} axisLine={false} tickLine={false} />
            <Tooltip contentStyle={{ background: '#111827', border: '1px solid #1e293b', borderRadius: 6, fontFamily: 'JetBrains Mono', fontSize: 11 }} />
            <Legend wrapperStyle={{ fontSize: 11, paddingTop: 12, fontFamily: 'JetBrains Mono' }} />
            {tkNames.map(function(tk, i) {
              var c = CHART_COLORS[i % CHART_COLORS.length];
              return (
                <Area key={tk} type="monotone" dataKey={tk}
                  stroke={c} strokeWidth={2} fill={'url(#grad' + i + ')'}
                  connectNulls={true} dot={false}
                  activeDot={{ r: 4, strokeWidth: 0 }}
                />
              );
            })}
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function AlertsTab(props) {
  var alertData    = props.alertData  || {};
  var liveNews     = props.liveNews   || [];
  var countdown    = props.countdown  || null;
  var testMode     = props.testMode   || false;
  var onSimulate   = props.onSimulate || function() {};
  var inKZ         = !!alertData.in_killzone;
  var alerts       = alertData.alerts || [];
  var nextKZ       = alertData.next_killzone || '—';

  // Filtrer les news des 30 dernières minutes
  var now30 = Date.now() - 30 * 60 * 1000;
  var recentNews = liveNews.filter(function(n) {
    if (!n.fetched_at) return true;   // garder si pas de timestamp
    return new Date(n.fetched_at).getTime() >= now30;
  });

  var sevColor = function(s) { return s === 'HIGH' ? '#ef4444' : s === 'MEDIUM' ? '#f59e0b' : '#475569'; };

  return (
    <div>
      {/* Statut killzone */}
      <div className="card mb16" style={{ padding: '14px 18px' }}>
        <div className="rowb">
          <div className="row g12">
            {testMode
              ? <span className="kz-live" style={{ background: 'rgba(249,115,22,.15)', color: '#f97316', borderColor: 'rgba(249,115,22,.4)' }}>🧪 TEST MODE actif</span>
              : inKZ
                ? <span className="kz-live">🔴 LIVE 14h30-16h30 CET</span>
                : <span className="kz-off">⏸️ Hors killzone</span>
            }
            {(inKZ || testMode) && countdown !== null && (
              <span className="mc" style={{ fontSize: 11 }}>Prochain scan dans : <span style={{ color: 'var(--text)', fontWeight: 700 }}>{countdown}s</span></span>
            )}
          </div>
          {alertData.scanned_at && (
            <span className="mc" style={{ fontSize: 10 }}>Scanné à {alertData.scanned_at}</span>
          )}
        </div>
        {!inKZ && !testMode && (
          <div style={{ marginTop: 10, fontSize: 11, color: 'var(--muted)' }}>
            Prochaine session : <span style={{ color: 'var(--text)', fontWeight: 600 }}>{nextKZ}</span>
            <div style={{ marginTop: 6, color: '#475569' }}>En attendant, analyse tes Setup Candidates sur TradingView 📈</div>
            <div style={{ marginTop: 10 }}>
              <button onClick={onSimulate} style={{ background: 'transparent', border: '1px solid #334155', color: '#94a3b8', borderRadius: 6, padding: '4px 10px', fontSize: 11, cursor: 'pointer', fontFamily: 'inherit' }}>
                🧪 Simuler killzone
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Alertes */}
      <div className="stitle">ALERTES INTRADAY</div>
      {alerts.length === 0
        ? <div className="card mc" style={{ textAlign: 'center', padding: 24, fontSize: 12 }}>
            {inKZ ? 'Aucune alerte pour le moment — scan en cours...' : 'Les alertes apparaîtront pendant la killzone (14h30-16h30 CET)'}
          </div>
        : <div style={{ marginBottom: 16 }}>
            {alerts.map(function(a, i) {
              return (
                <div key={i} className={'alert-item alert-' + a.severity}>
                  <div className="rowb">
                    <div className="row g8" style={{ flex: 1 }}>
                      <a href={'https://www.tradingview.com/chart/?symbol=' + a.ticker} target="_blank" rel="noopener"
                         className="tv-link" style={{ color: sevColor(a.severity), fontSize: 12, minWidth: 42 }}>
                        {a.ticker}
                      </a>
                      <span style={{ fontSize: 12, color: 'var(--text)' }}>{a.message}</span>
                    </div>
                    <div className="row g8">
                      <span className="badge" style={{ background: sevColor(a.severity) + '20', color: sevColor(a.severity), border: '1px solid ' + sevColor(a.severity) + '40', fontSize: 9 }}>{a.severity}</span>
                      <span className="mc" style={{ fontSize: 10 }}>{a.timestamp}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
      }

      {/* Breaking News 30 min */}
      <div>
        <div className="stitle">⚡ BREAKING NEWS (30 MIN)</div>
        {recentNews.length === 0
          ? <div className="card mc" style={{ textAlign: 'center', padding: 18, fontSize: 12 }}>Pas de breaking news</div>
          : <div className="card">
              {recentNews.map(function(n, i) {
                var sc = n.sentiment === 'BULL' ? '#10b981' : n.sentiment === 'BEAR' ? '#ef4444' : '#f59e0b';
                var arrivalTime = n.fetched_at ? new Date(n.fetched_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
                return (
                  <div key={i} style={{ padding: '8px 0', borderBottom: i < recentNews.length - 1 ? '1px solid rgba(30,41,59,.4)' : 'none' }}>
                    <div className="row g6" style={{ alignItems: 'flex-start', marginBottom: 4 }}>
                      <span style={{ width: 8, height: 8, borderRadius: '50%', background: sc, flexShrink: 0, marginTop: 3 }} />
                      <a href={n.link || '#'} target="_blank" rel="noopener" className="news-link">{n.title}</a>
                    </div>
                    <div className="row g6 wrap" style={{ paddingLeft: 14 }}>
                      <span className="mc" style={{ fontSize: 10 }}>{n.source}</span>
                      {arrivalTime && <span className="mc" style={{ fontSize: 10 }}>à {arrivalTime}</span>}
                      {(n.matched_tickers || []).slice(0, 2).map(function(t) {
                        return <span key={t} className="badge b-accent" style={{ fontSize: 9, padding: '1px 5px' }}>{t}</span>;
                      })}
                    </div>
                  </div>
                );
              })}

        }
      </div>
    </div>
  );
}

var TABS = [
  { id: 'overview',  label: '📊 Vue d\'ensemble' },
  { id: 'watchlist', label: '📈 Watchlist'        },
  { id: 'reddit',    label: '🔴 Reddit'           },
  { id: 'news',      label: '📰 News'             },
  { id: 'alerts',    label: '⚡ Alertes'          },
  { id: 'history',   label: '📅 Historique'       }
];

// Ref module-level pour éviter les stale closures dans setInterval
var _testModeRef = { active: false, expiry: null };

function TradingDashboard() {
  var tabState  = useState('overview');
  var tab       = tabState[0];
  var setTab    = tabState[1];

  var timeState = useState(new Date());
  var time      = timeState[0];
  var setTime   = timeState[1];

  var dataState = useState(DEMO);
  var data      = dataState[0];
  var setData   = dataState[1];

  var refreshMsgState = useState('idle');   // 'idle' | 'scanning' | 'done:Xs' | 'error'
  var refreshMsg      = refreshMsgState[0];
  var setRefreshMsg   = refreshMsgState[1];
  var loading         = refreshMsg === 'scanning';

  var lastUpdState = useState(null);
  var lastUpd      = lastUpdState[0];
  var setLastUpd   = lastUpdState[1];

  var alertDataState  = useState({ in_killzone: false, alerts: [], next_killzone: '—', scanned_at: null });
  var alertData       = alertDataState[0];
  var setAlertData    = alertDataState[1];

  var liveNewsState   = useState([]);
  var liveNews        = liveNewsState[0];
  var setLiveNews     = liveNewsState[1];

  var unreadState     = useState(0);
  var unread          = unreadState[0];
  var setUnread       = unreadState[1];

  var countdownState  = useState(null);
  var countdown       = countdownState[0];
  var setCountdown    = countdownState[1];

  var testModeState   = useState(false);
  var testMode        = testModeState[0];
  var setTestMode     = testModeState[1];

  var testExpiryState = useState(null);   // timestamp ms d'expiration du test mode
  var testExpiry      = testExpiryState[0];
  var setTestExpiry   = testExpiryState[1];

  useEffect(function() {
    // Charger chaque endpoint indépendamment — mise à jour dès réception, timeout 15s
    var eps = ['market', 'tickers', 'reddit', 'news', 'macro', 'history'];
    eps.forEach(function(ep) {
      var ctrl = new AbortController();
      var tid  = setTimeout(function() { ctrl.abort(); }, 15000);
      fetch('/api/' + ep, { signal: ctrl.signal })
        .then(function(r) { return r.json(); })
        .then(function(json) {
          clearTimeout(tid);
          setData(function(prev) {
            var next = Object.assign({}, prev);
            next[ep] = json;
            return next;
          });
          setLastUpd(new Date());
        })
        .catch(function() { clearTimeout(tid); /* garde données démo */ });
    });

    // Horloge
    var clk = setInterval(function() { setTime(new Date()); }, 1000);

    // ── Alerts auto-refresh ──────────────────────────────────────────────
    var ALERT_INTERVAL  = 5 * 60;   // 5 min en secondes
    var NEWS_INTERVAL   = 15 * 60;  // 15 min en secondes
    var alertTick       = ALERT_INTERVAL;
    var newsTick        = NEWS_INTERVAL;

    function fetchAlerts(force) {
      var url = force ? '/api/alerts?force=true' : '/api/alerts';
      fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(json) {
          setAlertData(function(prev) {
            var prevCount = (prev.alerts || []).length;
            var newCount  = (json.alerts || []).length;
            if (newCount > prevCount) {
              setUnread(function(u) { return u + (newCount - prevCount); });
            }
            return json;
          });
        })
        .catch(function() {});
    }

    function fetchAlertNews() {
      fetch('/api/alerts/news')
        .then(function(r) { return r.json(); })
        .then(function(json) {
          if (json.new_news && json.new_news.length > 0) {
            setLiveNews(function(prev) { return json.new_news.concat(prev).slice(0, 30); });
            setUnread(function(u) { return u + json.new_news.length; });
          }
        })
        .catch(function() {});
    }

    // Premier appel immédiat
    fetchAlerts();
    fetchAlertNews();

    var alertTimer = setInterval(function() {
      alertTick--;
      newsTick--;
      setCountdown(alertTick);
      // Expiration du test mode (via ref pour éviter stale closure)
      if (_testModeRef.active && _testModeRef.expiry && Date.now() >= _testModeRef.expiry) {
        _testModeRef.active = false;
        _testModeRef.expiry = null;
        setTestMode(false);
        setTestExpiry(null);
      }
      if (alertTick <= 0) {
        fetchAlerts(_testModeRef.active);
        alertTick = ALERT_INTERVAL;
      }
      if (newsTick <= 0) {
        fetchAlertNews();
        newsTick = NEWS_INTERVAL;
      }
    }, 1000);

    return function() { clearInterval(clk); clearInterval(alertTimer); };
  }, []);

  function activateTestMode() {
    var expiry = Date.now() + 5 * 60 * 1000;   // 5 min
    _testModeRef.active = true;
    _testModeRef.expiry = expiry;
    setTestMode(true);
    setTestExpiry(expiry);
    fetch('/api/alerts?force=true')
      .then(function(r) { return r.json(); })
      .then(function(json) {
        setAlertData(function(prev) {
          var prevCount = (prev.alerts || []).length;
          var newCount  = (json.alerts || []).length;
          if (newCount > prevCount) { setUnread(function(u) { return u + (newCount - prevCount); }); }
          return json;
        });
      })
      .catch(function() {});
  }

  function handleRefresh() {
    if (loading) return;
    setRefreshMsg('scanning');
    fetch('/api/refresh', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(json) {
        var dur = json.duration != null ? Math.round(json.duration) : '?';
        // Recharger chaque endpoint indépendamment
        var eps = ['market', 'tickers', 'reddit', 'news', 'macro', 'history'];
        eps.forEach(function(ep) {
          var ctrl = new AbortController();
          var tid  = setTimeout(function() { ctrl.abort(); }, 15000);
          fetch('/api/' + ep, { signal: ctrl.signal })
            .then(function(r) { return r.json(); })
            .then(function(edata) {
              clearTimeout(tid);
              setData(function(prev) { var n = Object.assign({}, prev); n[ep] = edata; return n; });
              setLastUpd(new Date());
            })
            .catch(function() { clearTimeout(tid); });
        });
        setRefreshMsg('done:' + dur + 's');
        setTimeout(function() { setRefreshMsg('idle'); }, 3000);
      })
      .catch(function() {
        setRefreshMsg('error');
        setTimeout(function() { setRefreshMsg('idle'); }, 3000);
      });
  }

  var fmtTime = function(d) { return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); };
  var fmtDate = function(d) { return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }); };

  var regime  = data.market ? data.market.regime  : null;
  var verdict = data.macro  ? data.macro.verdict   : null;
  var verdictCls = verdict === 'GO' ? 'b-bull' : verdict === 'NO TRADE' ? 'b-bear' : 'b-neutral';

  return (
    <div className="app">
      <header className="header">
        <div>
          <div className="header-title">SMC-AI MORNING BRIEF v2</div>
          <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{fmtDate(time)}</div>
        </div>
        <div className="header-right">
          {regime  && <span className={'rpill rp-' + regime}>{regime}</span>}
          {verdict && <span className={'badge ' + verdictCls}>{verdict}</span>}
          {testMode
            ? <span className="kz-live" style={{ background: 'rgba(249,115,22,.15)', color: '#f97316', borderColor: 'rgba(249,115,22,.4)' }}>🧪 TEST MODE</span>
            : alertData.in_killzone
              ? <span className="kz-live">🔴 LIVE 14h30-16h30</span>
              : <span className="kz-off">⏸️ Hors session</span>
          }
          <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--muted)' }}>{fmtTime(time)}</span>
          <button
            className={'btn btn-scan' + (loading ? ' is-scanning' : '')}
            onClick={handleRefresh}
            disabled={loading}
            style={refreshMsg === 'error' ? { color: '#ef4444', borderColor: '#ef4444' } : {}}
          >
            {loading
              ? <span><span className="spin-anim">⟳</span> Scan en cours...</span>
              : refreshMsg.startsWith('done:') ? ('✅ Scan terminé en ' + refreshMsg.slice(5))
              : refreshMsg === 'error' ? '❌ Erreur'
              : '🔄 Rafraîchir'}
          </button>
        </div>
      </header>

      <nav className="tabs" style={{ justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ display: 'flex' }}>
          {TABS.map(function(t) {
            return (
              <button key={t.id} className={'tab' + (tab === t.id ? ' active' : '')} onClick={function() {
                setTab(t.id);
                if (t.id === 'alerts') { setUnread(0); }
              }}>
                {t.label}
                {t.id === 'alerts' && unread > 0 && (
                  <span className="tab-badge">{unread > 9 ? '9+' : unread}</span>
                )}
              </button>
            );
          })}
        </div>
        {lastUpd && (
          <span className="mc" style={{ fontSize: 10, padding: '0 16px', flexShrink: 0 }}>
            Dernière MAJ : {lastUpd.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
          </span>
        )}
      </nav>

      <main className="content">
        {tab === 'overview'  && <OverviewTab  data={data} />}
        {tab === 'watchlist' && <WatchlistTab data={data} />}
        {tab === 'reddit'    && <RedditTab    data={data} />}
        {tab === 'news'      && <NewsTab      data={data} />}
        {tab === 'alerts'    && <AlertsTab alertData={alertData} liveNews={liveNews} countdown={(alertData.in_killzone || testMode) ? countdown : null} testMode={testMode} onSimulate={activateTestMode} />}
        {tab === 'history'   && <HistoryTab   data={data} />}
      </main>
      <footer style={{ padding: '8px 24px', borderTop: '1px solid var(--border)', background: 'var(--card)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span className="mc" style={{ fontSize: 10 }}>Données live — Killzone 14h30-16h30 CET</span>
        <span className="mc" style={{ fontSize: 10 }}>SMC-AI Trading Agent v2</span>
      </footer>
    </div>
  );
}

// ── Rendu ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(TradingDashboard, null)
);
</script>
</body>
</html>
