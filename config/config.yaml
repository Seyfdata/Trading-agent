# --- Killzone ---
killzone:
  start: "14:30"
  end: "16:30"
  timezone: CET
  scan_interval_minutes: 5
  news_interval_minutes: 15

# --- Seuils d'alertes ---
alerts:
  volume_breakout_multiplier: 2.0    # alerte si vol > Xx moyenne
  sma200_proximity_pct: 1.5          # alerte si prix à moins de X% de SMA200
  strong_move_pct: 3.0               # alerte si variation intraday > X%
  breaking_news_window_minutes: 30   # fenêtre pour les breaking news

# --- Scoring (pondération des composantes /25 chacune) ---
scoring:
  sma200_weight: 25
  volume_weight: 25
  reddit_weight: 25
  news_weight: 25

# --- Trading rules ---
trading:
  risk_pct_min: 0.5
  risk_pct_max: 1.0
  rr_minimum: 2.5
  max_trades_per_day: 2
  max_exposure_pct: 3.0

# --- Dashboard ---
dashboard:
  port: 8000
  auto_refresh_seconds: 300
  telegram_enabled: false
